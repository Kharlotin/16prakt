<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Слайд-шоу</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Слайд-шоу (5 картинок)</h2>

<button onclick="startSlideshow()">Запустить</button>
<button onclick="stopSlideshow()">Остановить</button>
<button onclick="prevSlide()">Предыдущая</button>
<button onclick="nextSlideManual()">Следующая</button>

<div class="slider">

<img src="1.png" class="slide" style="display:block;">
<img src="2.png" class="slide">
<img src="3.png" class="slide">
<img src="4.png" class="slide">
<img src="5.png" class="slide">
<img src="6.png" class="slide">
<img src="7.png" class="slide">

</div>

<script src="script.js"></script>

</body>
</html>
